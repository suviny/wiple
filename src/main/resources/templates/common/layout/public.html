<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title layout:title-pattern="$LAYOUT_TITLE $CONTENT_TITLE">Wiple</title>
    <th:block th:replace="~{common/layout/fragments/headLibs :: headLibs}"/>
    <th:block layout:fragment="page-style"/>
</head>
<body>
    <div class="root">
        <div class="container is-flex-centered">
            <main class="content">
                <th:block layout:fragment="page-content"/>
            </main>
        </div>
    </div>
    <th:block th:replace="~{common/layout/fragments/scripts :: scripts}"></th:block>
    <th:block layout:fragment="page-script"/>
</body>
</html>
